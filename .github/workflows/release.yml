name: Package Addon

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without creating a release"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create addon directory
        run: |
          ADDON="${{ github.event.repository.name }}"
          mkdir -p build/$ADDON

          # Copy files
          cp "$ADDON.toc" build/$ADDON/
          cp "$ADDON.lua" build/$ADDON/
          # no error if options file doesn't exist
          cp "$ADDON"_options.lua build/$ADDON/ || true
          cp LICENSE build/$ADDON/

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Convert README.md to HTML (self-contained)
        run: |
          ADDON="${{ github.event.repository.name }}"
          pandoc README.md -f gfm -t html -s --self-contained \
            -o build/$ADDON/README.html

      - name: Create ZIP
        run: |
          ADDON="${{ github.event.repository.name }}"
          cd build
          zip -r "$ADDON-${GITHUB_REF_NAME}.zip" "$ADDON"

      - name: Dry run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run completed — no release was created."

      - name: Upload Release Asset
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ github.event.repository.name }}-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
